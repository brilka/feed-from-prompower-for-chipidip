name: Update Chip&Dip XML Feed

on:
  schedule:
    # Запуск каждый день в 01:00 по UTC (04:00 по Москве)
    - cron: '0 1 * * *'
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script
        run: python main_chipidip.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feed-from-prompower-for-chipidip.xml
          git add chipidip_pdf_cache.json
          git commit -m "Авто-обновление XML-feed Чип и Дип" || echo "Нет изменений для коммита"
          git push
