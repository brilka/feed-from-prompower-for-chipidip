name: Update Chip&Dip XML Feed

on:
  schedule:
    # Запуск каждый день по расписанию (всегда в полном объеме)
    - cron: '0 1 * * *'
  workflow_dispatch:
    # Добавляем меню для ручного запуска
    inputs:
      debug_mode:
        description: 'Включить режим отладки (парсинг только нескольких товаров с принудительным обновлением PDF)'
        type: boolean
        default: false
      debug_limit:
        description: 'Сколько позиций проверять (если отладка включена)'
        type: number
        default: 3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script
        env:
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_KEY: ${{ secrets.API_KEY }}
          # Пробрасываем галочки из интерфейса в скрипт
          DEBUG_MODE: ${{ github.event.inputs.debug_mode }}
          DEBUG_LIMIT: ${{ github.event.inputs.debug_limit }}
        run: python main_chipidip.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feed-from-prompower-for-chipidip.xml
          git add chipidip_pdf_cache.json
          git commit -m "Авто-обновление XML-feed Чип и Дип" || echo "Нет изменений для коммита"
          git push
